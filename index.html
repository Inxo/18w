<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>18 Words — choose your language</title>
<style>
  :root {
    --bg: #f6f3ff;
    --bg-elevated: #ffffff;
    --tile-border: #ddd3fb;
    --text: #201a3a;
    --text-dim: #746e96;
    --accent: #7c3aed;
    --accent-2: #ec4899;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #140f2b;
      --bg-elevated: #1f1847;
      --tile-border: #3c3178;
      --text: #f5f2ff;
      --text-dim: #b3a8e6;
      --accent: #c084fc;
      --accent-2: #f472b6;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100%;
  }
  .wrap {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 48px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .brand {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .brand-accent {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 32px;
  }
  .langs {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }
  .lang-link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    border-radius: 14px;
    border: 1px solid var(--tile-border);
    background: var(--bg-elevated);
    color: var(--text);
    text-decoration: none;
    font-weight: 700;
    font-size: 17px;
    transition: transform 0.12s ease, border-color 0.2s ease;
  }
  .lang-link:active { transform: scale(0.97); }
  .lang-link:hover { border-color: var(--accent); }
  .lang-flag { font-size: 26px; }
  .lang-native { flex: 1; text-align: left; }
  .lang-caption {
    display: block;
    font-weight: 500;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">18 <span class="brand-accent">Words</span></div>
  <div class="subtitle">Choose your language · Выберите язык · เลือกภาษา</div>

  <div class="langs">
    <a class="lang-link" href="ru/">
      <span class="lang-flag">🇷🇺</span>
      <span class="lang-native">Русский<span class="lang-caption">18 слов — собери слово</span></span>
    </a>
    <a class="lang-link" href="en/">
      <span class="lang-flag">🇬🇧</span>
      <span class="lang-native">English<span class="lang-caption">18 Words — build the word</span></span>
    </a>
    <a class="lang-link" href="th/">
      <span class="lang-flag">🇹🇭</span>
      <span class="lang-native">ไทย<span class="lang-caption">18 คำ — เรียงคำให้ถูก</span></span>
    </a>
  </div>
</div>
</body>
</html>
