<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>18 Words — build the word</title>
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>
<div class="app">

  <header class="app-header">
    <div class="brand">18 <span class="brand-accent">Words</span></div>
    <div class="header-right">
      <div class="day-info">Day #<span id="dayNumber">1</span> · <span id="dateLabel"></span></div>
      <button id="btnTheme" class="theme-toggle" type="button" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <main id="gameScreen" class="screen">

    <div class="progress-row">
      <div class="progress-label">Word <span id="wordIndex">1</span> / 18 <span id="wordLenBadge" class="len-badge"></span></div>
      <div class="score-label">Score: <span id="score">0</span></div>
    </div>
    <div class="progress-bar-track"><div id="progressFill" class="progress-fill"></div></div>

    <div class="timer-row">
      <div class="timer-bar-track"><div id="timerFill" class="timer-fill"></div></div>
      <div id="timerNum" class="timer-num">30</div>
    </div>

    <div id="answerSlots" class="answer-slots" aria-live="polite"></div>

    <div id="letterTiles" class="letter-tiles"></div>

    <div class="controls">
      <button id="btnBackspace" class="ctrl-btn" type="button">⌫ Backspace</button>
      <button id="btnShuffle" class="ctrl-btn" type="button">🔀 Shuffle</button>
      <button id="btnSubmit" class="ctrl-btn ctrl-primary" type="button">Submit ⏎</button>
    </div>

    <div id="feedback" class="feedback"></div>
  </main>

  <section id="summaryScreen" class="screen hidden">
    <h1 class="summary-title">Today's Results</h1>
    <div class="summary-day">Day #<span id="sumDayNumber">1</span> · <span id="sumDateLabel"></span></div>

    <div class="summary-stats">
      <div class="stat">
        <div class="stat-value" id="sumCorrect">0/18</div>
        <div class="stat-caption">correct words</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="sumScore">0</div>
        <div class="stat-caption">points</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="sumStreak">0</div>
        <div class="stat-caption">best streak</div>
      </div>
    </div>

    <div id="sumGrid" class="summary-grid"></div>

    <button id="btnShare" class="ctrl-btn ctrl-primary" type="button">📋 Copy Result</button>
    <div id="summaryNext" class="summary-next">New words tomorrow</div>

    <div id="archiveSection" class="archive-section hidden">
      <h2 class="archive-title">Past Days</h2>
      <div class="archive-row">
        <select id="archiveSelect" class="archive-select"></select>
        <button id="btnArchivePlay" class="ctrl-btn ctrl-primary" type="button">Play</button>
      </div>
      <div id="archiveEmpty" class="archive-empty hidden">You've played every available day 🎉</div>
    </div>
  </section>

</div>

<div id="adOverlay" class="ad-overlay hidden">
  <div class="ad-card">
    <div class="ad-label">ADVERTISEMENT</div>
    <div class="ad-video-placeholder">
      <div class="ad-play-icon">▶</div>
      <div class="ad-caption">Playing video…</div>
    </div>
    <div class="ad-progress-track"><div id="adProgressFill" class="ad-progress-fill"></div></div>
    <div class="ad-timer">Continuing in <span id="adSeconds">30</span> sec</div>
    <div class="ad-word-reveal">The word was: <span id="adWord"></span></div>
    <div id="adDefinition" class="ad-definition hidden">Meaning: <span id="adDefinitionText"></span></div>
    <button id="btnAdClose" class="ctrl-btn ctrl-primary" type="button" disabled>Playing…</button>
  </div>
</div>

<script src="words.js?v=2"></script>
<script src="iframe-resize.js?v=1"></script>
<script src="script.js?v=3"></script>
<script>Words18Mount.en(document);</script>
</body>
</html>
