name: Generate next month's words

on:
  schedule:
    # 03:00 UTC on the 20th of every month
    - cron: "0 3 20 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Compute next month's range
        id: range
        run: |
          start=$(date -u -d "$(date -u +%Y-%m-01) +1 month" +%Y-%m-%d)
          label=$(date -u -d "$start" +"%B %Y")
          echo "start=$start" >> "$GITHUB_OUTPUT"
          echo "label=$label" >> "$GITHUB_OUTPUT"

      - name: Generate words for next month (ru + th)
        working-directory: backend
        run: ./generate.sh "${{ steps.range.outputs.start }}" 1

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add days th/days
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "Generate words for ${{ steps.range.outputs.label }}"
            git push
          fi
